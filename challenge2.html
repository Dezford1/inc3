<!doctype html>
<html>
  <head>
    <title>I ♥ NY T-Shirt</title>

    <style>
      div {
        position: relative;
        background-color: lightgray;
        display: inline-block;
      }

      img {
        position: relative;
        left: 10px;

        border: 3px solid black;
        padding: 10px;
        margin: 20px;

        box-shadow: 5px 5px 10px gray;
      }

      .words {
        font-family: Impact;
        font-size: 60px;
      }

      .first {
        position: absolute;
        top: 120px;
        left: 145px;
        z-index: 2;
      }

      .heart {
        color: red;
        font-size: 80px;

        position: absolute;
        top: 95px;
        left: 180px;
        z-index: 2;
      }

      .last {
        position: absolute;
        top: 180px;
        left: 155px;
        z-index: 2;
      }
    </style>
  </head>

  <body>
    <span class="first words">I</span>

    <span class="heart">&hearts;</span>

    <span class="last words">NY</span>

    <div>
      <img src="tshirt.png" alt="White t-shirt" />
    </div>
  </body>
</html>
